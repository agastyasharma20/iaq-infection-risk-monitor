# config.yaml
# Centralized configuration for the IAQ Infection Risk project (V2)
# Change values here instead of hunting through code.

paths:
  data_dir: "data"
  reports_dir: "reports"
  logs_dir: "logs"
  sensor_data_file: "sensor_data.csv"
  labeled_data_file: "labeled_data.csv"
  alerts_log_file: "alerts_log.csv"

features:
  - co2_ppm
  - temperature_c
  - humidity_pct
  - occupancy

wells_riley:
  co2_outdoor_ppm: 420.0
  co2_exhaled_ppm: 38000.0
  quanta_rate: 25.0
  default_exposure_minutes: 60

risk_thresholds:
  low_max: 0.20
  medium_max: 0.45
  # anything >= medium_max is High

alerting:
  enabled: true
  trigger_category: "High"
  cooldown_minutes: 30   # don't re-alert the same room within this window
  notification_channel: "log"   # options: "log" (safe default), "email"
  dry_run: true                  # true = never actually sends, just logs what WOULD be sent
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    sender_address: "your-alert-account@gmail.com"
    sender_password: "REPLACE_WITH_APP_PASSWORD"   # use an app password, never your real password
    recipient_addresses:
      - "facilities-team@example.com"

forecasting:
  horizon_steps: 4        # predict 4 steps ahead (1 hr, given 15-min intervals)
  lag_steps: 4             # use last 4 readings as features

building_layout:
  # V6: Real room adjacency, replacing the V5 placeholder 3x3 grid guess.
  # List every pair of rooms that share a wall, corridor, or HVAC duct.
  # This directly drives the cross-room risk propagation model
  # (src/graph_propagation.py) -- edit this to match your real floor plan.
  # Format: each entry is [room_a, room_b].
  adjacency:
    - [Room_1, Room_2]
    - [Room_2, Room_3]
    - [Room_1, Room_4]
    - [Room_2, Room_5]
    - [Room_3, Room_6]
    - [Room_4, Room_5]
    - [Room_5, Room_6]
    - [Room_4, Room_7]
    - [Room_5, Room_8]
    - [Room_6, Room_9]
    - [Room_7, Room_8]
    - [Room_8, Room_9]

api:
  host: "0.0.0.0"
  port: 8000
  api_key: "changeme-iaq-v3-key"   # V6: kept for backward compatibility -- see api_users below
  users:
    # V6: real per-user API keys with roles, replacing the single shared key.
    # role "admin" can call every endpoint. role "viewer" can only call
    # read-only endpoints (predictions, alerts, history) -- not training,
    # not config-affecting actions.
    - name: "admin"
      key: "admin-changeme-key-please-replace"
      role: "admin"
    - name: "viewer"
      key: "viewer-changeme-key-please-replace"
      role: "viewer"

model:
  test_size: 0.25
  random_state: 42
