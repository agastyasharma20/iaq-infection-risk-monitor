name: CI

# Runs automatically on every push and pull request:
# 1. Installs dependencies
# 2. Regenerates sample data + trains models (so tests have something to check against)
# 3. Runs the full pytest suite
#
# A green checkmark on your GitHub repo after this passes is a genuinely
# useful thing to point to in a viva or resume -- it proves the project
# actually runs, not just that the code exists.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample data
        run: python data/generate_sample_data.py

      - name: Label dataset
        run: python src/label_dataset.py

      - name: Train models
        run: python src/train_and_compare.py

      - name: Train forecast model
        run: python src/forecast_model.py

      - name: Train anomaly detector
        run: python src/anomaly_detection.py

      - name: Train RL advisor
        run: python src/rl_advisor.py

      - name: Run tests
        run: pytest tests/ -v
